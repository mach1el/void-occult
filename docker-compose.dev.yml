# Preview frontend local (vite dev, hot-reload) — review UI trước khi merge master.
# Không cần backend/mongodb/routing network, không đụng docker-compose.yml chính.
#   docker compose -f docker-compose.dev.yml up
# Mở: http://localhost:5173
#
# Cần cả AI chat luận giải thì chạy thêm backend thật (cần backend/.env có GEMINI_API_KEY):
#   docker compose up -d backend mongodb
services:
  frontend-dev:
    image: node:24-alpine
    container_name: apexvoid-occult-frontend-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_dev_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_dev_node_modules:
